<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; flex-direction: column;
        }

        #start-screen { text-align: center; z-index: 10; transition: opacity 0.5s; display: flex; flex-direction: column; align-items: center; }
        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 5rem; color: #1a1a1a; margin-bottom: 40px; }
        
        .btn-start {
            padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer;
            background-color: #f5f5dc; color: black; border-radius: 50px; transition: 0.3s;
        }

        #chat-wrapper {
            display: none; width: 95%; max-width: 500px; height: 90vh;
            flex-direction: column; opacity: 0; transition: opacity 0.5s;
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        #chat-container::-webkit-scrollbar { display: none; }

        .message { margin-bottom: 12px; display: flex; opacity: 0; animation: fadeInMsg 0.3s forwards; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 10px 16px; border-radius: 18px 18px 18px 0; max-width: 85%; font-weight: 300; font-size: 0.95rem; }
        .bubble-right { background: #f5f5dc; color: black; padding: 10px 16px; border-radius: 18px 18px 0 18px; max-width: 85%; font-weight: 400; font-size: 0.95rem; }

        #input-area {
            height: 70px; background: #fff; border-top: 1px solid #eee;
            display: flex; align-items: center; justify-content: center; padding: 10px; gap: 10px;
        }

        .option-chip {
            background: #f5f5dc; padding: 8px 20px; border-radius: 20px;
            font-size: 0.9rem; cursor: pointer; border: 1px solid transparent;
            transition: 0.2s; user-select: none;
        }

        .typing { font-style: italic; color: #aaa; font-size: 0.8rem; padding: 5px 20px; display: none; min-height: 15px; }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(5vh); opacity: 0; }
        }
        .sparkle { position: absolute; width: 2px; height: 2px; background: black; border-radius: 50%; pointer-events: none; animation: floatUp 5s linear forwards; }
        
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); border-color: #d4d4b8; }
            100% { transform: scale(1); }
        }
        .pulse { animation: pulse 1.2s infinite; border: 1px solid #eee; }

        #final-screen { display: none; text-align: center; opacity: 0; transition: opacity 1s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="start()">click me</button>
    </div>

    <div id="chat-wrapper">
        <div id="chat-container"></div>
        <div id="typing-indicator" class="typing">Dorian is typing...</div>
        <div id="input-area"></div>
    </div>

    <div id="final-screen">
        <h2 style="font-family: 'Cormorant Upright'; font-size: 3rem;">For you.</h2>
        <img src="desenho.jpg" style="max-width: 80%; border: 1px solid #eee; padding: 10px;">
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const inputArea = document.getElementById('input-area');
        const typing = document.getElementById('typing-indicator');

        let isProcessing = false;

        function start() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('chat-wrapper').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('chat-wrapper').style.opacity = '1';
                    setInterval(createSparkle, 1500); // Poucos brilhos
                    runScript(0);
                }, 50);
            }, 500);
        }

        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }

        const script = [
            { side: 'left', text: 'Clara' },
            { side: 'left', text: 'I know I said I wouldn’t talk to you anymore' },
            { side: 'left', text: 'I’m lowkey about to have nightmares just imagining the sigh you’re gonna let out seeing I sent you this link…' },
            { side: 'left', text: 'but, can I talk to you?' },
            { side: 'choose', options: [
                { text: 'ugh fine', next: 7 },
                { text: 'no! sorry', next: 'no' }
            ]},
            { side: 'left', text: '...' },
            { side: 'choose_forced', options: [{ text: 'ugh fine', next: 7 }] },
            { side: 'left', text: 'thank you…' },
            { side: 'left', text: 'I wanted to apologize' },
            { side: 'right_auto', text: 'again?', next: 10 },
            { side: 'left', text: 'stop, you know me :(' },
            { side: 'left', text: 'I miss having you as a friend' },
            { side: 'left', text: 'and talking to you every day' },
            { side: 'left', text: 'I wanted to update you on everything' },
            { side: 'left', text: 'and know how you’ve been too' },
            { side: 'left', text: 'if you got into college' },
            { side: 'left', text: 'your days' },
            { side: 'left', text: 'my days…' },
            { side: 'left', text: 'can I entertain you for a bit?' },
            { side: 'right_auto', text: 'I guess lol', next: 'final' }
        ];

        function runScript(idx) {
            isProcessing = false;

            if (idx === 'final') { finish(); return; }
            
            if (idx === 'no') { 
                inputArea.innerHTML = '';
                addBubble('right', 'no! sorry');
                setTimeout(() => {
                    typing.style.display = 'block';
                    setTimeout(() => {
                        typing.style.display = 'none';
                        addBubble('left', '...');
                        setTimeout(() => runScript(6), 1200); // Aparece o pulsar rápido
                    }, 800);
                }, 500);
                return;
            }

            const m = script[idx];
            if (m.side === 'left') {
                typing.style.display = 'block';
                // Digitação rápida
                const delay = Math.max(800, m.text.length * 20);
                setTimeout(() => {
                    typing.style.display = 'none';
                    addBubble('left', m.text);
                    setTimeout(() => runScript(idx + 1), 600); // Próxima mensagem rápida
                }, delay);
            } else if (m.side === 'choose' || m.side === 'choose_forced') {
                displayOptions(m.options, m.side === 'choose_forced');
            } else if (m.side === 'right_auto') {
                setTimeout(() => {
                    addBubble('right', m.text);
                    setTimeout(() => runScript(m.next), 800);
                }, 1200);
            }
        }

        function addBubble(side, text) {
            const div = document.createElement('div');
            div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function displayOptions(opts, shouldPulse = false) {
            inputArea.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'option-chip' + (shouldPulse ? ' pulse' : '');
                btn.innerText = o.text;
                btn.onclick = () => {
                    if (isProcessing) return;
                    isProcessing = true;
                    inputArea.innerHTML = ''; 
                    if (o.next !== 'no') addBubble('right', o.text);
                    runScript(o.next);
                };
                inputArea.appendChild(btn);
            });
        }

        function finish() {
            document.getElementById('chat-wrapper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('chat-wrapper').classList.add('hidden');
                document.getElementById('final-screen').style.display = 'block';
                setTimeout(() => document.getElementById('final-screen').style.opacity = '1', 50);
            }, 600);
        }
    </script>
</body>
</html>
