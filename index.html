<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; flex-direction: column;
        }

        /* --- Telas --- */
        #start-screen, #chat-wrapper, #game-wrapper, #final-screen { 
            width: 95%; max-width: 500px; flex-direction: column; align-items: center; 
            display: none; opacity: 0; transition: opacity 0.8s ease-in-out; 
        }
        #start-screen { display: flex; opacity: 1; }

        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 5rem; color: #1a1a1a; margin-bottom: 40px; text-align: center; }
        .btn-start {
            padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer;
            background-color: #f5f5dc; color: black; border-radius: 50px; transition: 0.3s;
        }

        /* --- Chat --- */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; width: 100%; height: 60vh;
            scroll-behavior: smooth;
            padding-bottom: 100px; 
        }
        #chat-container::-webkit-scrollbar { width: 0px; }

        .message { margin-bottom: 15px; display: flex; opacity: 0; animation: fadeInMsg 0.4s forwards; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 12px 18px; border-radius: 18px 18px 18px 0; max-width: 80%; font-size: 0.95rem; }
        .bubble-right { background: #f5f5dc; color: black; padding: 12px 18px; border-radius: 18px 18px 0 18px; max-width: 80%; font-size: 0.95rem; }
        
        #input-area { height: 110px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; border-top: 1px solid #eee; background: white; z-index: 20; }
        .option-chip { background: #f5f5dc; padding: 12px 24px; border-radius: 25px; cursor: pointer; border: 1px solid transparent; font-weight: 500; }
        .typing { font-style: italic; color: #aaa; font-size: 0.8rem; padding: 10px 20px; display: none; }

        /* --- Jogo --- */
        #game-stage { width: 100vw; height: 320px; border-bottom: 3px solid #1a1a1a; position: relative; overflow: hidden; background: #fff; }
        #player { position: absolute; bottom: 0; left: 15%; width: 65px; height: 65px; z-index: 5; transform-origin: bottom center; }

        .walking { animation: walkElastic 0.5s infinite alternate ease-in-out; }
        @keyframes walkElastic { from { transform: rotate(-5deg) scaleY(1); } to { transform: rotate(5deg) scaleY(0.95); } }

        .jumping { animation: jumpCycle 0.75s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        @keyframes jumpCycle {
            0% { transform: scale(1.7, 0.3); }   /* Amassa MUITO no impulso */
            25% { transform: scale(0.6, 1.6); }  /* Estica MUITO no ar */
            50% { transform: scale(1, 1); }
            100% { transform: scale(1.7, 0.3); } /* Impacto pesado no chão */
        }

        .obstacle { position: absolute; bottom: 0; right: -60px; width: 45px; height: 45px; animation: jelly 0.8s infinite alternate; }
        @keyframes jelly {
            from { transform: scale(1, 1); }
            to { transform: scale(1.2, 0.8); }
        }

        .hit-effect { filter: sepia(1) saturate(10) hue-rotate(-50deg) !important; animation: vibrate 0.2s linear 2; }
        @keyframes vibrate { 0% { transform: translateX(5px); } 50% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

        #countdown { font-size: 6rem; font-family: 'Cormorant Upright'; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); z-index: 10; }

        .sparkle { position: absolute; width: 3px; height: 3px; background: #000; border-radius: 50%; pointer-events: none; animation: floatUp 5s linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 0.7; } 100% { transform: translateY(-10vh); opacity: 0; } }
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="changeScreen('start-screen', 'chat-wrapper', startChat)">click me</button>
    </div>

    <div id="chat-wrapper">
        <div id="chat-container"></div>
        <div id="typing-indicator" class="typing">Dorian is typing...</div>
        <div id="input-area"></div>
    </div>

    <div id="game-wrapper">
        <div id="game-info" style="text-align: center; margin-bottom: 10px; font-weight: 300;">W, Space or Tap to Jump</div>
        <div id="game-stage" onmousedown="playerJump()" ontouchstart="playerJump()">
            <div id="countdown"></div>
            <div id="player" class="walking"><img src="pfp.png" width="65" id="pfp-img" style="border-radius:10px;"></div>
        </div>
    </div>

    <div id="final-screen">
        <h2 class="hello-text" style="font-size: 3.5rem;">For you.</h2>
        <img src="desenho.jpg" style="max-width: 85%; border: 1px solid #eee; padding: 10px;">
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const inputArea = document.getElementById('input-area');
        const typing = document.getElementById('typing-indicator');
        const pfpImg = document.getElementById('pfp-img');
        let isProcessing = false;

        function changeScreen(from, to, callback) {
            const f = document.getElementById(from);
            const t = document.getElementById(to);
            f.style.opacity = '0';
            setTimeout(() => {
                f.style.display = 'none';
                t.style.display = 'flex';
                setTimeout(() => {
                    t.style.opacity = '1';
                    if (callback) callback();
                }, 100);
            }, 800);
        }

        const script = [
            { side: 'left', text: 'Clara' },
            { side: 'left', text: 'I know I said I wouldn’t talk to you anymore' },
            { side: 'left', text: 'I’m lowkey about to have nightmares just imagining the sigh you’re gonna let out seeing I sent you this link…' },
            { side: 'left', text: 'but, can I talk to you?' },
            { side: 'choose', options: [{ text: 'ugh fine', next: 7 }, { text: 'no! sorry', next: 'no' }] },
            { side: 'left', text: '...' },
            { side: 'choose_forced', options: [{ text: 'ugh fine', next: 7 }] },
            { side: 'left', text: 'thank you…' },
            { side: 'left', text: 'I wanted to apologize' },
            { side: 'right_auto', text: 'again?', next: 10 },
            { side: 'left', text: 'stop, you know me :(' },
            { side: 'left', text: 'I miss having you as a friend' },
            { side: 'left', text: 'and talking to you every day' },
            { side: 'left', text: 'I wanted to update you on everything' },
            { side: 'left', text: 'and know how you’ve been too' },
            { side: 'left', text: 'if you got into college' },
            { side: 'left', text: 'your days' },
            { side: 'left', text: 'my days…' },
            { side: 'left', text: 'can I entertain you for a bit?' },
            { side: 'right_auto', text: 'I guess lol', next: 'game' }
        ];

        function startChat() { setInterval(createSparkle, 700); runScript(0); }

        function runScript(idx) {
            isProcessing = false;
            if (idx === 'game') { changeScreen('chat-wrapper', 'game-wrapper', startCountdown); return; }
            if (idx === 'no') {
                addBubble('right', 'no! sorry');
                setTimeout(() => {
                    typing.style.display = 'block';
                    forceScroll();
                    setTimeout(() => {
                        typing.style.display = 'none';
                        addBubble('left', '...');
                        setTimeout(() => displayOptions([{ text: 'ugh fine', next: 7 }]), 1000);
                    }, 1200);
                }, 600);
                return;
            }

            const m = script[idx];
            if (!m) return;

            if (m.side === 'left') {
                typing.style.display = 'block';
                forceScroll();
                setTimeout(() => {
                    typing.style.display = 'none';
                    addBubble('left', m.text);
                    setTimeout(() => runScript(idx + 1), 700);
                }, Math.max(1000, m.text.length * 20));
            } else if (m.side === 'choose') { displayOptions(m.options); }
            else if (m.side === 'right_auto') {
                setTimeout(() => {
                    addBubble('right', m.text);
                    setTimeout(() => runScript(m.next), 800);
                }, 1600);
            }
        }

        function addBubble(side, text) {
            const div = document.createElement('div'); div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            chatContainer.appendChild(div);
            forceScroll();
        }

        function forceScroll() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight + 200,
                behavior: 'smooth'
            });
        }

        function displayOptions(opts) {
            inputArea.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'option-chip';
                btn.innerText = o.text;
                btn.onclick = () => {
                    if (isProcessing) return; isProcessing = true;
                    inputArea.innerHTML = '';
                    if (o.next !== 'no') addBubble('right', o.text);
                    runScript(o.next);
                };
                inputArea.appendChild(btn);
            });
            forceScroll();
        }

        // --- Game Logic ---
        let gameActive = false, isJumping = false, obsCount = 0;

        window.addEventListener('keydown', (e) => {
            if (gameActive && (e.code === 'Space' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')) {
                e.preventDefault();
                playerJump();
            }
        });

        function startCountdown() {
            let count = 3;
            const cd = document.getElementById('countdown');
            const timer = setInterval(() => {
                cd.innerText = count <= 0 ? "GO!" : count;
                if (count < -1) { clearInterval(timer); cd.innerText = ""; startGame(); }
                count--;
            }, 800);
        }

        function startGame() { gameActive = true; spawnObs(); }

        function playerJump() {
            if (isJumping || !gameActive) return;
            isJumping = true;
            const p = document.getElementById('player');
            p.classList.remove('walking'); p.classList.add('jumping');
            
            let b = 0, v = 18, g = 0.95; 
            const jumpInterval = setInterval(() => {
                v -= g; b += v;
                if (b <= 0) {
                    b = 0; clearInterval(jumpInterval);
                    p.style.bottom = '0px';
                    setTimeout(() => {
                        isJumping = false;
                        p.classList.remove('jumping'); p.classList.add('walking');
                    }, 100);
                }
                p.style.bottom = b + 'px';
            }, 20);
        }

        function spawnObs() {
            if (!gameActive) return;
            const stage = document.getElementById('game-stage');
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.innerHTML = `<img src="obj.png" width="45" onerror="this.style.background='black'; border-radius:50%;">`;
            stage.appendChild(obs);

            let pos = -60;
            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); obs.remove(); return; }
                pos += 10; obs.style.right = pos + 'px';

                const pRect = document.getElementById('player').getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();
                if (oRect.left < pRect.right - 20 && oRect.right > pRect.left + 20 && oRect.top < pRect.bottom - 10) {
                    if (!pfpImg.classList.contains('hit-effect')) {
                        pfpImg.classList.add('hit-effect');
                        setTimeout(() => pfpImg.classList.remove('hit-effect'), 400);
                    }
                }

                if (pos > window.innerWidth + 100) {
                    clearInterval(move); obs.remove(); obsCount++;
                    if (obsCount >= 12) { gameActive = false; changeScreen('game-wrapper', 'final-screen'); }
                    else { setTimeout(spawnObs, Math.random() * 500 + 300); }
                }
            }, 20);
        }

        function createSparkle() {
            const s = document.createElement('div'); s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw'; document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }
    </script>
</body>
</html>
