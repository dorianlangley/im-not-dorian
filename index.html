<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Sincere Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: white; font-family: 'Raleway', sans-serif; overflow-x: hidden; color: #333; }
        
        /* Estilo da Caligrafia */
        .chique { font-family: 'Cormorant Upright', serif; font-size: 3rem; text-align: center; margin-top: 50px; }

        /* Container do Jogo */
        #game-container {
            width: 100%;
            height: 300px;
            border-bottom: 2px solid #000;
            position: relative;
            background: #fff;
            overflow: hidden;
            cursor: pointer;
        }

        #player {
            width: 50px; height: 50px;
            position: absolute; bottom: 0; left: 100px;
            transition: background 0.2s;
            z-index: 2;
        }

        #chaser {
            width: 45px; height: 45px;
            position: absolute; bottom: 0; left: 20px;
            opacity: 0.7;
        }

        .obstacle {
            width: 40px; height: 40px;
            position: absolute; bottom: 0; right: -50px;
        }

        #speech-bubble {
            position: absolute; top: 50px; width: 100%;
            text-align: center; font-style: italic; font-size: 1.2rem;
            color: #666; height: 30px;
        }

        .hit { filter: invert(27%) sepia(91%) saturate(2352%) hue-rotate(346deg) brightness(104%) contrast(97%); }

        /* Sparkles */
        .sparkle { position: absolute; width: 3px; height: 3px; background: gold; border-radius: 50%; pointer-events: none; }

        .hidden { display: none; }
        #final-section { text-align: center; padding: 50px; opacity: 0; transition: opacity 2s; }
        img.desenho { max-width: 80%; border: 1px solid #ddd; padding: 10px; background: #fff; }
    </style>
</head>
<body>

    <div class="chique">A Sincere Message</div>
    <div id="speech-bubble">Click or Tap to Jump!</div>

    <div id="game-container" onclick="jump()">
        <div id="chaser"><img src="ele.png" width="50"></div> <div id="player"><img src="ela.png" width="50" id="player-img"></div> </div>

    <div id="final-section">
        <p id="apology-text" style="max-width: 600px; margin: 0 auto 30px; line-height: 1.6; font-size: 1.1rem;"></p>
        <img src="desenho.jpg" class="desenho">
    </div>

    <script>
        const player = document.getElementById('player');
        const playerImg = document.getElementById('player-img');
        const bubble = document.getElementById('speech-bubble');
        const finalSection = document.getElementById('final-section');
        
        let isJumping = false;
        let frame = 0;
        const phrases = ["Wait!", "I'm so sorry...", "Don't run away!", "Ouch!", "My bad!", "I can explain!"];

        function jump() {
            if (isJumping) return;
            isJumping = true;
            let pos = 0;
            let timer = setInterval(() => {
                if (pos >= 120) {
                    clearInterval(timer);
                    let downTimer = setInterval(() => {
                        if (pos <= 0) {
                            clearInterval(downTimer);
                            isJumping = false;
                        }
                        pos -= 5;
                        player.style.bottom = pos + 'px';
                    }, 20);
                }
                pos += 5;
                player.style.bottom = pos + 'px';
            }, 20);
        }

        function createObstacle() {
            frame++;
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            obs.innerHTML = `<img src="obstaculo.png" width="40">`;
            document.getElementById('game-container').appendChild(obs);

            let obsPos = window.innerWidth;
            let obsTimer = setInterval(() => {
                obsPos -= 7;
                obs.style.right = (window.innerWidth - obsPos) + 'px';

                // Checar Colisão (Simplificada)
                let playerLeft = 100;
                let obsCurrentLeft = obsPos;
                if (obsCurrentLeft > 100 && obsCurrentLeft < 150 && parseInt(player.style.bottom) < 40) {
                    playerImg.classList.add('hit');
                    bubble.innerText = "Ouch! I'm sorry!";
                    setTimeout(() => playerImg.classList.remove('hit'), 500);
                }

                if (obsPos < -50) {
                    clearInterval(obsTimer);
                    obs.remove();
                }
                
                // Mudar frases aleatoriamente
                if (frame % 100 == 0) bubble.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                
                // Após 15 obstáculos, libera o final
                if (frame > 15) {
                    clearInterval(obsTimer);
                    showFinal();
                }
            }, 20);
        }

        function showFinal() {
            document.getElementById('game-container').classList.add('hidden');
            bubble.classList.add('hidden');
            finalSection.style.opacity = "1";
            document.getElementById('apology-text').innerText = "Everything I wanted to say is that I value us more than any mistake. This drawing is for you...";
        }

        setInterval(createObstacle, 3000);

        // Sparkles Effect
        document.addEventListener('mousemove', (e) => {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = e.pageX + 'px'; s.style.top = e.pageY + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        });
    </script>
</body>
</html>
