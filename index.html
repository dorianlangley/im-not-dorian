<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
        }

        /* --- Sistema de Telas Corrigido --- */
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.6s ease-in-out; 
            z-index: 1; pointer-events: none; /* Bloqueia cliques se estiver invisível */
        }

        #start-screen { display: flex; opacity: 1; z-index: 100; pointer-events: all; }

        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 5rem; color: #1a1a1a; margin-bottom: 40px; text-align: center; }
        .btn-start {
            padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer;
            background-color: #f5f5dc; color: black; border-radius: 50px; transition: 0.3s;
            position: relative; z-index: 110; pointer-events: all;
        }
        .btn-start:hover { background-color: #ebebd0; transform: scale(1.05); }

        /* --- Chat --- */
        #chat-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        #chat-container { 
            width: 100%; max-width: 500px; height: 75vh; 
            overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; 
            scroll-behavior: smooth; margin: 0 auto;
            pointer-events: all;
        }
        #chat-container::-webkit-scrollbar { width: 0px; }
        
        .message { margin-bottom: 20px; display: flex; opacity: 0; animation: fadeInMsg 0.5s forwards; width: 100%; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 14px 20px; border-radius: 20px 20px 20px 0; max-width: 80%; }
        .bubble-right { background: #f5f5dc; color: black; padding: 14px 20px; border-radius: 20px 20px 0 20px; max-width: 80%; }
        
        #input-area { height: 120px; width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #eee; background: white; margin: 0 auto; pointer-events: all; }
        .option-chip { background: #f5f5dc; padding: 14px 28px; border-radius: 30px; cursor: pointer; border: 1px solid #ddd; }

        /* --- Jogo --- */
        #game-wrapper { width: 100vw; height: 100vh; background: #fff; overflow: hidden; display: flex; flex-direction: column; }
        #game-stage { width: 100%; flex: 1; position: relative; overflow: hidden; display: flex; align-items: flex-end; pointer-events: all; }
        #ground { width: 100vw; height: 15vh; background: #000; z-index: 20; position: relative; }

        #player { position: absolute; bottom: 0; left: 15%; width: 70px; height: 70px; z-index: 25; transform-origin: bottom center; }
        
        .obstacle { 
            position: absolute; bottom: 0; right: -150px; width: 90px; height: 90px; z-index: 22; 
            transform-origin: bottom center; animation: jellyWalk 0.6s infinite alternate ease-in-out;
        }
        @keyframes jellyWalk {
            0% { transform: scale(1.1, 0.85); }
            100% { transform: scale(0.9, 1.1); }
        }

        .cloud { position: absolute; opacity: 0.15; z-index: 1; pointer-events: none; }
        .sparkle { position: absolute; background: #000; border-radius: 50%; pointer-events: none; z-index: 5; }

        @keyframes fall { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(110vh); opacity: 0; } }

        .walking { animation: walkElastic 0.4s infinite alternate ease-in-out; }
        @keyframes walkElastic { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        .jumping { animation: jumpCycle 0.6s forwards; }
        @keyframes jumpCycle { 0% { transform: scale(1.6, 0.4); } 50% { transform: scale(1, 1); } 100% { transform: scale(1, 1); } }

        #countdown { 
            font-size: 7rem; font-family: 'Arial Black', sans-serif; font-weight: 900;
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%); 
            z-index: 30; color: #000;
        }

        #hit-text { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; opacity: 0; z-index: 40; }
        .hit-effect { filter: invert(20%) sepia(100%) saturate(500%) !important; animation: vibrate 0.1s linear 3; }

        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="changeScreen('start-screen', 'chat-wrapper', startChat)">click me</button>
    </div>

    <div id="chat-wrapper" class="screen">
        <div id="chat-container">
            <div id="chat-content"></div>
            <div id="typing-indicator" style="display:none; font-style: italic; color: #aaa; margin-bottom: 20px; width: 100%; text-align: left;">Dorian is typing...</div>
        </div>
        <div id="input-area"></div>
    </div>

    <div id="game-wrapper" class="screen">
        <div id="countdown"></div>
        <div id="game-stage" onmousedown="playerJump()" ontouchstart="playerJump()">
            <div id="player" class="walking">
                <div id="hit-text">OW!</div>
                <img src="pfp.png" width="70" id="pfp-img" style="border-radius:12px;">
            </div>
        </div>
        <div id="ground"></div>
    </div>

    <div id="final-screen" class="screen">
        <h2 class="hello-text" style="font-size: 3.5rem;">For you.</h2>
        <img src="desenho.jpg" style="max-width: 85%; pointer-events: all;">
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatContent = document.getElementById('chat-content');
        const inputArea = document.getElementById('input-area');
        const typing = document.getElementById('typing-indicator');
        const pfpImg = document.getElementById('pfp-img');
        const hitLabel = document.getElementById('hit-text');
        const stage = document.getElementById('game-stage');
        let isProcessing = false, gameActive = false;

        function scrollChat() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function changeScreen(from, to, callback) {
            const f = document.getElementById(from); 
            const t = document.getElementById(to);
            
            f.style.opacity = '0';
            f.style.pointerEvents = 'none'; // Desativa cliques na tela que sai
            
            setTimeout(() => {
                f.style.display = 'none'; 
                t.style.display = 'flex';
                
                setTimeout(() => { 
                    t.style.opacity = '1'; 
                    t.style.pointerEvents = 'all'; // Ativa cliques na tela que entra
                    t.style.zIndex = '100'; // Garante que fique no topo
                    if (callback) callback(); 
                }, 50);
            }, 600);
        }

        const script = [
            { side: 'left', text: 'Clara' },
            { side: 'left', text: 'I know I said I wouldn’t talk to you anymore' },
            { side: 'left', text: 'I’m lowkey about to have nightmares imagining you seeing this...' },
            { side: 'left', text: 'but, can I talk to you?' },
            { side: 'choose', options: [{ text: 'ugh fine', next: 7 }, { text: 'no! sorry', next: 'no' }] },
            { side: 'left', text: '...' },
            { side: 'choose_forced', options: [{ text: 'ugh fine', next: 7 }] },
            { side: 'left', text: 'thank you…' },
            { side: 'left', text: 'I wanted to apologize' },
            { side: 'right_auto', text: 'again?', next: 10 },
            { side: 'left', text: 'stop, you know me :(' },
            { side: 'left', text: 'I miss having you as a friend' },
            { side: 'left', text: 'and talking to you every day' },
            { side: 'left', text: 'I wanted to update you on everything' },
            { side: 'left', text: 'and know how you’ve been too' },
            { side: 'left', text: 'if you got into college' },
            { side: 'left', text: 'your days' },
            { side: 'left', text: 'my days…' },
            { side: 'left', text: 'can I entertain you for a bit?' },
            { side: 'right_auto', text: 'I guess lol', next: 'game' }
        ];

        function startChat() { runScript(0); }

        function runScript(idx) {
            isProcessing = false;
            if (idx === 'game') { changeScreen('chat-wrapper', 'game-wrapper', startCountdown); return; }
            if (idx === 'no') {
                addBubble('right', 'no! sorry');
                setTimeout(() => {
                    typing.style.display = 'block'; scrollChat();
                    setTimeout(() => { typing.style.display = 'none'; addBubble('left', '...'); setTimeout(() => displayOptions([{ text: 'ugh fine', next: 7 }]), 1000); }, 1200);
                }, 600);
                return;
            }
            const m = script[idx]; if (!m) return;
            if (m.side === 'left') {
                typing.style.display = 'block'; scrollChat();
                setTimeout(() => { typing.style.display = 'none'; addBubble('left', m.text); setTimeout(() => runScript(idx + 1), 700); }, Math.max(1000, m.text.length * 20));
            } else if (m.side === 'choose') { displayOptions(m.options); }
            else if (m.side === 'right_auto') { setTimeout(() => { addBubble('right', m.text); setTimeout(() => runScript(m.next), 800); }, 1600); }
        }

        function addBubble(side, text) {
            const div = document.createElement('div'); div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            chatContent.appendChild(div); scrollChat();
        }

        function displayOptions(opts) {
            inputArea.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('div'); btn.className = 'option-chip'; btn.innerText = o.text;
                btn.onclick = () => { if (isProcessing) return; isProcessing = true; inputArea.innerHTML = ''; if (o.next !== 'no') addBubble('right', o.text); runScript(o.next); };
                inputArea.appendChild(btn);
            });
        }

        function createSparkle() {
            const s = document.createElement('div'); s.className = 'sparkle';
            const size = Math.random() * 5 + 2;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + 'vw'; s.style.top = '-10px';
            const duration = gameActive ? (Math.random() * 2 + 1.5) : (Math.random() * 5 + 3);
            s.style.animation = `fall ${duration}s linear forwards`;
            document.body.appendChild(s);
            setTimeout(() => s.remove(), duration * 1000);
        }
        setInterval(createSparkle, 150);

        function startCountdown() {
            let count = 3; const cd = document.getElementById('countdown');
            const timer = setInterval(() => {
                cd.innerText = count <= 0 ? "GO!" : count;
                if (count < -1) { clearInterval(timer); cd.innerText = ""; startGame(); }
                count--;
            }, 800);
        }

        function startGame() { gameActive = true; spawnObs(); setInterval(spawnCloud, 1800); }

        function spawnCloud() {
            if(!gameActive) return;
            const cloud = document.createElement('img'); cloud.src = 'obj-cloud.png'; cloud.className = 'cloud';
            cloud.style.width = (Math.random() * 120 + 130) + 'px'; cloud.style.top = (Math.random() * 100 + 20) + 'px';
            cloud.style.right = '-200px'; stage.appendChild(cloud);
            let pos = -200; let speed = Math.random() * 1.5 + 2.5;
            const moveCloud = setInterval(() => {
                if(!gameActive) { clearInterval(moveCloud); cloud.remove(); return; }
                pos += speed; cloud.style.right = pos + 'px';
                if (pos > window.innerWidth + 250) { clearInterval(moveCloud); cloud.remove(); }
            }, 20);
        }

        function playerJump() {
            if (isJumping || !gameActive) return;
            isJumping = true; const p = document.getElementById('player');
            p.classList.remove('walking'); p.classList.add('jumping');
            let b = 0, v = 22, g = 1.1; 
            const jumpInterval = setInterval(() => {
                v -= g; b += v;
                if (b <= 0) {
                    b = 0; clearInterval(jumpInterval); p.style.bottom = '0px';
                    p.classList.remove('jumping'); p.classList.add('walking'); isJumping = false;
                }
                p.style.bottom = b + 'px';
            }, 20);
        }

        let isJumping = false, score = 0;

        function spawnObs() {
            if (!gameActive) return;
            let groupSize = Math.floor(Math.random() * 2) + 1; 
            for(let i = 0; i < groupSize; i++) { setTimeout(() => createObstacle(), i * 400); }
            setTimeout(spawnObs, Math.random() * 1500 + 1000);
        }

        function createObstacle() {
            if(!gameActive) return;
            const obs = document.createElement('div'); obs.className = 'obstacle';
            obs.innerHTML = `<img src="obj.png" width="90">`; stage.appendChild(obs);
            let pos = -150;
            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); obs.remove(); return; }
                pos += 14; obs.style.right = pos + 'px';
                const pRect = document.getElementById('pfp-img').getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();
                if (oRect.left < pRect.right - 25 && oRect.right > pRect.left + 25 && oRect.top < pRect.bottom - 10) {
                    if (!pfpImg.classList.contains('hit-effect')) {
                        pfpImg.classList.add('hit-effect'); hitLabel.innerText = "OW!";
                        hitLabel.style.opacity = "1"; setTimeout(() => { pfpImg.classList.remove('hit-effect'); hitLabel.style.opacity = "0"; }, 400);
                    }
                }
                if (pos > window.innerWidth + 200) { clearInterval(move); obs.remove(); score++;
                    if (score >= 35) { gameActive = false; setTimeout(() => changeScreen('game-wrapper', 'final-screen'), 500); }
                }
            }, 20);
        }
    </script>
</body>
</html>
