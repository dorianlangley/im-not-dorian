<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; flex-direction: column;
        }

        /* --- Telas --- */
        #start-screen, #chat-wrapper, #game-wrapper, #final-screen { 
            width: 95%; max-width: 500px; flex-direction: column; align-items: center; 
            display: none; opacity: 0; transition: opacity 0.8s ease-in-out; 
        }
        #start-screen { display: flex; opacity: 1; }

        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 5rem; color: #1a1a1a; margin-bottom: 40px; text-align: center; }
        .btn-start {
            padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer;
            background-color: #f5f5dc; color: black; border-radius: 50px; transition: 0.3s;
        }

        /* --- Chat Refeito --- */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; width: 100%; height: 55vh;
            scroll-behavior: smooth;
        }
        #chat-container::-webkit-scrollbar { width: 0px; }
        #anchor { height: 120px; width: 100%; flex-shrink: 0; } /* Espaçador para enquadramento */

        .message { margin-bottom: 20px; display: flex; opacity: 0; animation: fadeInMsg 0.5s forwards; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 14px 20px; border-radius: 20px 20px 20px 0; max-width: 80%; line-height: 1.5; }
        .bubble-right { background: #f5f5dc; color: black; padding: 14px 20px; border-radius: 20px 20px 0 20px; max-width: 80%; line-height: 1.5; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        #input-area { height: 120px; display: flex; align-items: center; justify-content: center; width: 100%; border-top: 1px solid #eee; background: white; z-index: 100; }
        .option-chip { background: #f5f5dc; padding: 14px 28px; border-radius: 30px; cursor: pointer; border: 1px solid #ddd; font-weight: 500; transition: 0.2s; }
        .option-chip:active { transform: scale(0.9); }
        .typing { font-style: italic; color: #aaa; font-size: 0.85rem; padding: 10px 0; margin-left: 20px; display: none; }

        /* --- Jogo Turbo --- */
        #game-stage { 
            width: 100vw; height: 350px; border-bottom: 4px solid #1a1a1a; 
            position: relative; overflow: hidden; background: #fff; transition: background 0.5s;
        }
        #player { position: absolute; bottom: 0; left: 15%; width: 75px; height: 75px; z-index: 10; transform-origin: bottom center; }

        .walking { animation: walkElastic 0.4s infinite alternate ease-in-out; }
        @keyframes walkElastic { from { transform: rotate(-8deg); } to { transform: rotate(8deg); } }

        .jumping { animation: jumpJuicy 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes jumpJuicy {
            0% { transform: scale(1.8, 0.4); }
            30% { transform: scale(0.5, 1.8); }
            100% { transform: scale(1.8, 0.4); }
        }

        /* Obstáculos Gigantes */
        .obstacle { 
            position: absolute; bottom: 0; right: -100px; 
            width: 80px; height: 80px; /* Aumentado bem mais */
            animation: obstacleBounce 0.6s infinite alternate ease-in-out; 
        }
        @keyframes obstacleBounce {
            from { transform: scale(1); }
            to { transform: scale(1.1, 0.9) translateY(5px); }
        }

        .screen-shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .hit-effect { filter: invert(20%) sepia(100%) saturate(500%) hue-rotate(0deg) !important; animation: vibrate 0.1s linear infinite; }
        @keyframes vibrate { 0% { transform: translate(5px); } 100% { transform: translate(-5px); } }

        #countdown { font-size: 8rem; font-family: 'Cormorant Upright'; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 10; pointer-events: none; }

        .sparkle { position: absolute; width: 4px; height: 4px; background: #000; border-radius: 50%; pointer-events: none; animation: floatUp 5s linear forwards; }
        @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 0.8; } 100% { transform: translateY(-10vh); opacity: 0; } }
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="changeScreen('start-screen', 'chat-wrapper', startChat)">click me</button>
    </div>

    <div id="chat-wrapper">
        <div id="chat-container">
            <div id="chat-content"></div>
            <div id="typing-indicator" class="typing">Dorian is typing...</div>
            <div id="anchor"></div> </div>
        <div id="input-area"></div>
    </div>

    <div id="game-wrapper">
        <div id="game-info" style="text-align: center; margin-bottom: 10px; font-weight: 300;">Don't stop.</div>
        <div id="game-stage" onmousedown="playerJump()" ontouchstart="playerJump()">
            <div id="countdown"></div>
            <div id="player" class="walking"><img src="pfp.png" width="75" id="pfp-img" style="border-radius:12px;"></div>
        </div>
    </div>

    <div id="final-screen">
        <h2 class="hello-text" style="font-size: 3.5rem;">For you.</h2>
        <img src="desenho.jpg" style="max-width: 85%; border: 1px solid #eee; padding: 10px; border-radius: 5px;">
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatContent = document.getElementById('chat-content');
        const inputArea = document.getElementById('input-area');
        const typing = document.getElementById('typing-indicator');
        const pfpImg = document.getElementById('pfp-img');
        const anchor = document.getElementById('anchor');
        let isProcessing = false;

        function changeScreen(from, to, callback) {
            const f = document.getElementById(from);
            const t = document.getElementById(to);
            f.style.opacity = '0';
            setTimeout(() => {
                f.style.display = 'none';
                t.style.display = 'flex';
                setTimeout(() => {
                    t.style.opacity = '1';
                    if (callback) callback();
                }, 100);
            }, 800);
        }

        const script = [
            { side: 'left', text: 'Clara' },
            { side: 'left', text: 'I know I said I wouldn’t talk to you anymore' },
            { side: 'left', text: 'I’m lowkey about to have nightmares just imagining the sigh you’re gonna let out seeing I sent you this link…' },
            { side: 'left', text: 'but, can I talk to you?' },
            { side: 'choose', options: [{ text: 'ugh fine', next: 7 }, { text: 'no! sorry', next: 'no' }] },
            { side: 'left', text: '...' },
            { side: 'choose_forced', options: [{ text: 'ugh fine', next: 7 }] },
            { side: 'left', text: 'thank you…' },
            { side: 'left', text: 'I wanted to apologize' },
            { side: 'right_auto', text: 'again?', next: 10 },
            { side: 'left', text: 'stop, you know me :(' },
            { side: 'left', text: 'I miss having you as a friend' },
            { side: 'left', text: 'and talking to you every day' },
            { side: 'left', text: 'I wanted to update you on everything' },
            { side: 'left', text: 'and know how you’ve been too' },
            { side: 'left', text: 'if you got into college' },
            { side: 'left', text: 'your days' },
            { side: 'left', text: 'my days…' },
            { side: 'left', text: 'can I entertain you for a bit?' },
            { side: 'right_auto', text: 'I guess lol', next: 'game' }
        ];

        function startChat() { setInterval(createSparkle, 600); runScript(0); }

        function runScript(idx) {
            isProcessing = false;
            if (idx === 'game') { changeScreen('chat-wrapper', 'game-wrapper', startCountdown); return; }
            if (idx === 'no') {
                addBubble('right', 'no! sorry');
                setTimeout(() => {
                    typing.style.display = 'block';
                    scrollCamera();
                    setTimeout(() => {
                        typing.style.display = 'none';
                        addBubble('left', '...');
                        setTimeout(() => displayOptions([{ text: 'ugh fine', next: 7 }]), 1000);
                    }, 1200);
                }, 600);
                return;
            }

            const m = script[idx];
            if (!m) return;

            if (m.side === 'left') {
                typing.style.display = 'block';
                scrollCamera();
                setTimeout(() => {
                    typing.style.display = 'none';
                    addBubble('left', m.text);
                    setTimeout(() => runScript(idx + 1), 800);
                }, Math.max(1200, m.text.length * 25));
            } else if (m.side === 'choose') { displayOptions(m.options); }
            else if (m.side === 'right_auto') {
                setTimeout(() => {
                    addBubble('right', m.text);
                    setTimeout(() => runScript(m.next), 800);
                }, 1600);
            }
        }

        function addBubble(side, text) {
            const div = document.createElement('div'); div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            chatContent.appendChild(div);
            scrollCamera();
        }

        function scrollCamera() {
            anchor.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function displayOptions(opts) {
            inputArea.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('div');
                btn.className = 'option-chip';
                btn.innerText = o.text;
                btn.onclick = () => {
                    if (isProcessing) return; isProcessing = true;
                    inputArea.innerHTML = '';
                    if (o.next !== 'no') addBubble('right', o.text);
                    runScript(o.next);
                };
                inputArea.appendChild(btn);
            });
            scrollCamera();
        }

        // --- Game Logic ---
        let gameActive = false, isJumping = false, obsCount = 0;

        window.addEventListener('keydown', (e) => {
            if (gameActive && (e.code === 'Space' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')) {
                e.preventDefault();
                playerJump();
            }
        });

        function startCountdown() {
            let count = 3;
            const cd = document.getElementById('countdown');
            const timer = setInterval(() => {
                cd.innerText = count <= 0 ? "GO!" : count;
                if (count < -1) { clearInterval(timer); cd.innerText = ""; startGame(); }
                count--;
            }, 800);
        }

        function startGame() { gameActive = true; spawnObs(); }

        function playerJump() {
            if (isJumping || !gameActive) return;
            isJumping = true;
            const p = document.getElementById('player');
            const stage = document.getElementById('game-stage');
            p.classList.remove('walking'); p.classList.add('jumping');
            
            let b = 0, v = 20, g = 1.0; 
            const jumpInterval = setInterval(() => {
                v -= g; b += v;
                if (b <= 0) {
                    b = 0; clearInterval(jumpInterval);
                    p.style.bottom = '0px';
                    stage.classList.add('screen-shake'); // Shake ao cair
                    setTimeout(() => stage.classList.remove('screen-shake'), 200);
                    setTimeout(() => {
                        isJumping = false;
                        p.classList.remove('jumping'); p.classList.add('walking');
                    }, 100);
                }
                p.style.bottom = b + 'px';
            }, 20);
        }

        function spawnObs() {
            if (!gameActive) return;
            const stage = document.getElementById('game-stage');
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.innerHTML = `<img src="obj.png" width="80" height="80" onerror="this.style.background='black';">`;
            stage.appendChild(obs);

            let pos = -100;
            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); obs.remove(); return; }
                pos += 12; obs.style.right = pos + 'px';

                const pRect = document.getElementById('player').getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();
                
                // Colisão
                if (oRect.left < pRect.right - 30 && oRect.right > pRect.left + 30 && oRect.top < pRect.bottom - 20) {
                    if (!pfpImg.classList.contains('hit-effect')) {
                        pfpImg.classList.add('hit-effect');
                        stage.style.background = '#ffebeb';
                        setTimeout(() => {
                            pfpImg.classList.remove('hit-effect');
                            stage.style.background = '#fff';
                        }, 300);
                    }
                }

                if (pos > window.innerWidth + 150) {
                    clearInterval(move); obs.remove(); obsCount++;
                    if (obsCount >= 12) { 
                        gameActive = false; 
                        setTimeout(() => changeScreen('game-wrapper', 'final-screen'), 500); 
                    }
                    else { setTimeout(spawnObs, Math.random() * 400 + 200); }
                }
            }, 20);
        }

        function createSparkle() {
            const s = document.createElement('div'); s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw'; document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }
    </script>
</body>
</html>
