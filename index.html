<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; flex-direction: column;
        }

        /* --- Telas --- */
        #start-screen, #chat-wrapper, #game-wrapper, #final-screen { 
            width: 95%; max-width: 500px; flex-direction: column; align-items: center; 
            display: none; opacity: 0; transition: opacity 0.8s ease-in-out; 
        }
        #start-screen { display: flex; opacity: 1; }

        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 5rem; color: #1a1a1a; margin-bottom: 40px; text-align: center; }
        .btn-start {
            padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer;
            background-color: #f5f5dc; color: black; border-radius: 50px; transition: 0.3s;
        }

        /* --- Chat --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; width: 100%; height: 55vh; scroll-behavior: smooth; }
        #anchor { height: 120px; width: 100%; flex-shrink: 0; }
        .message { margin-bottom: 20px; display: flex; opacity: 0; animation: fadeInMsg 0.5s forwards; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 14px 20px; border-radius: 20px 20px 20px 0; max-width: 80%; }
        .bubble-right { background: #f5f5dc; color: black; padding: 14px 20px; border-radius: 20px 20px 0 20px; max-width: 80%; }
        #input-area { height: 120px; display: flex; align-items: center; justify-content: center; width: 100%; border-top: 1px solid #eee; background: white; z-index: 100; }
        .option-chip { background: #f5f5dc; padding: 14px 28px; border-radius: 30px; cursor: pointer; border: 1px solid #ddd; }

        /* --- Jogo com Chão Preto --- */
        #game-stage { 
            width: 100vw; height: 400px; 
            position: relative; overflow: hidden; 
            background: linear-gradient(to bottom, #fff 80%, #000 80%); /* Chão totalmente preto */
            display: flex; align-items: flex-end;
        }
        #player { position: absolute; bottom: 20%; left: 15%; width: 70px; height: 70px; z-index: 10; transform-origin: bottom center; }
        #hit-text { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; opacity: 0; transition: 0.1s; white-space: nowrap; z-index: 20; }

        .cloud { position: absolute; opacity: 0.15; z-index: 1; pointer-events: none; }

        /* Brilhos (Sparkles) */
        .sparkle { position: absolute; background: #000; border-radius: 50%; pointer-events: none; z-index: 0; }
        @keyframes fall { 
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .walking { animation: walkElastic 0.4s infinite alternate ease-in-out; }
        @keyframes walkElastic { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

        .jumping { animation: jumpCycle 0.6s forwards; }
        @keyframes jumpCycle { 0% { transform: scale(1.6, 0.4); } 20% { transform: scale(0.7, 1.4); } 50% { transform: scale(1, 1); } 100% { transform: scale(1, 1); } }

        .landed { animation: landImpact 0.25s forwards; }
        @keyframes landImpact { 0% { transform: scale(1.7, 0.3); } 50% { transform: scale(1.2, 0.8); } 100% { transform: scale(1, 1); } }

        .obstacle { position: absolute; bottom: calc(20% + 15px); right: -100px; width: 75px; height: 75px; z-index: 5; }
        
        .hit-effect { filter: invert(20%) sepia(100%) saturate(500%) !important; animation: vibrate 0.1s linear 3; }

        /* Fonte da Contagem mais "Game" */
        #countdown { 
            font-size: 6rem; font-family: 'Arial Black', sans-serif; font-weight: 900;
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            z-index: 2; color: #000; text-shadow: 4px 4px #f5f5dc;
        }
        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="changeScreen('start-screen', 'chat-wrapper', startChat)">click me</button>
    </div>

    <div id="chat-wrapper">
        <div id="chat-container">
            <div id="chat-content"></div>
            <div id="typing-indicator" style="display:none; font-style: italic; color: #aaa; margin-left: 20px;">Dorian is typing...</div>
            <div id="anchor"></div>
        </div>
        <div id="input-area"></div>
    </div>

    <div id="game-wrapper">
        <div id="game-stage" onmousedown="playerJump()" ontouchstart="playerJump()">
            <div id="countdown"></div>
            <div id="player" class="walking">
                <div id="hit-text">OW!</div>
                <img src="pfp.png" width="70" id="pfp-img" style="border-radius:12px;">
            </div>
        </div>
    </div>

    <div id="final-screen">
        <h2 class="hello-text" style="font-size: 3.5rem;">For you.</h2>
        <img src="desenho.jpg" style="max-width: 85%; border: 1px solid #eee; padding: 10px;">
    </div>

    <script>
        const chatContent = document.getElementById('chat-content');
        const inputArea = document.getElementById('input-area');
        const typing = document.getElementById('typing-indicator');
        const pfpImg = document.getElementById('pfp-img');
        const hitLabel = document.getElementById('hit-text');
        const anchor = document.getElementById('anchor');
        const stage = document.getElementById('game-stage');
        let isProcessing = false;
        let gameActive = false;

        const hitPhrases = ["OW!", "OUCH!", "HEY!", "STOP!", "HELP!", "T-T", "WATCH IT!"];

        function changeScreen(from, to, callback) {
            const f = document.getElementById(from); const t = document.getElementById(to);
            f.style.opacity = '0';
            setTimeout(() => {
                f.style.display = 'none'; t.style.display = 'flex';
                setTimeout(() => { t.style.opacity = '1'; if (callback) callback(); }, 100);
            }, 800);
        }

        const script = [
            { side: 'left', text: 'Clara' },
            { side: 'left', text: 'I know I said I wouldn’t talk to you anymore' },
            { side: 'left', text: 'I’m lowkey about to have nightmares imagining you seeing this...' },
            { side: 'left', text: 'but, can I talk to you?' },
            { side: 'choose', options: [{ text: 'ugh fine', next: 7 }, { text: 'no! sorry', next: 'no' }] },
            { side: 'left', text: '...' },
            { side: 'choose_forced', options: [{ text: 'ugh fine', next: 7 }] },
            { side: 'left', text: 'thank you…' },
            { side: 'left', text: 'I wanted to apologize' },
            { side: 'right_auto', text: 'again?', next: 10 },
            { side: 'left', text: 'stop, you know me :(' },
            { side: 'left', text: 'I miss having you as a friend' },
            { side: 'left', text: 'and talking to you every day' },
            { side: 'left', text: 'I wanted to update you on everything' },
            { side: 'left', text: 'and know how you’ve been too' },
            { side: 'left', text: 'if you got into college' },
            { side: 'left', text: 'your days' },
            { side: 'left', text: 'my days…' },
            { side: 'left', text: 'can I entertain you for a bit?' },
            { side: 'right_auto', text: 'I guess lol', next: 'game' }
        ];

        function startChat() { runScript(0); }

        function runScript(idx) {
            isProcessing = false;
            if (idx === 'game') { changeScreen('chat-wrapper', 'game-wrapper', startCountdown); return; }
            if (idx === 'no') {
                addBubble('right', 'no! sorry');
                setTimeout(() => {
                    typing.style.display = 'block'; anchor.scrollIntoView({ behavior: 'smooth' });
                    setTimeout(() => { typing.style.display = 'none'; addBubble('left', '...'); setTimeout(() => displayOptions([{ text: 'ugh fine', next: 7 }]), 1000); }, 1200);
                }, 600);
                return;
            }
            const m = script[idx]; if (!m) return;
            if (m.side === 'left') {
                typing.style.display = 'block'; anchor.scrollIntoView({ behavior: 'smooth' });
                setTimeout(() => { typing.style.display = 'none'; addBubble('left', m.text); setTimeout(() => runScript(idx + 1), 700); }, Math.max(1000, m.text.length * 20));
            } else if (m.side === 'choose') { displayOptions(m.options); }
            else if (m.side === 'right_auto') { setTimeout(() => { addBubble('right', m.text); setTimeout(() => runScript(m.next), 800); }, 1600); }
        }

        function addBubble(side, text) {
            const div = document.createElement('div'); div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            chatContent.appendChild(div); anchor.scrollIntoView({ behavior: 'smooth' });
        }

        function displayOptions(opts) {
            inputArea.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('div'); btn.className = 'option-chip'; btn.innerText = o.text;
                btn.onclick = () => { if (isProcessing) return; isProcessing = true; inputArea.innerHTML = ''; if (o.next !== 'no') addBubble('right', o.text); runScript(o.next); };
                inputArea.appendChild(btn);
            });
        }

        // --- Sparkle Rain (Chuva de Brilhos) ---
        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 5 + 2;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = '-10px';
            
            // Se o jogo estiver ativo, cai como chuva. Se não, flutua levemente.
            const duration = gameActive ? (Math.random() * 2 + 1) : (Math.random() * 5 + 3);
            s.style.animation = `fall ${duration}s linear forwards`;
            
            document.body.appendChild(s);
            setTimeout(() => s.remove(), duration * 1000);
        }
        setInterval(createSparkle, 150);

        // --- Game Logic ---
        let isJumping = false, score = 0;

        window.addEventListener('keydown', (e) => { if (gameActive && (e.code === 'Space' || e.key === 'w' || e.key === 'ArrowUp')) { e.preventDefault(); playerJump(); } });

        function startCountdown() {
            let count = 3; const cd = document.getElementById('countdown');
            const timer = setInterval(() => {
                cd.innerText = count <= 0 ? "GO!" : count;
                if (count < -1) { clearInterval(timer); cd.innerText = ""; startGame(); }
                count--;
            }, 800);
        }

        function startGame() { 
            gameActive = true; 
            spawnObs(); 
            setInterval(spawnCloud, 1800); 
        }

        function spawnCloud() {
            if(!gameActive) return;
            const cloud = document.createElement('img');
            cloud.src = 'obj-cloud.png';
            cloud.className = 'cloud';
            cloud.style.width = (Math.random() * 120 + 130) + 'px';
            cloud.style.top = (Math.random() * 80 + 10) + 'px';
            cloud.style.right = '-200px';
            stage.appendChild(cloud);

            let pos = -200;
            let speed = Math.random() * 1.5 + 2.5;
            const moveCloud = setInterval(() => {
                if(!gameActive) { clearInterval(moveCloud); cloud.remove(); return; }
                pos += speed;
                cloud.style.right = pos + 'px';
                if (pos > window.innerWidth + 250) { clearInterval(moveCloud); cloud.remove(); }
            }, 20);
        }

        function playerJump() {
            if (isJumping || !gameActive) return;
            isJumping = true; const p = document.getElementById('player');
            p.classList.remove('walking', 'landed'); p.classList.add('jumping');
            let b = 0, v = 19, g = 1.0; 
            const jumpInterval = setInterval(() => {
                v -= g; b += v;
                if (b <= 0) {
                    b = 0; clearInterval(jumpInterval); p.style.bottom = '20%';
                    p.classList.remove('jumping'); p.classList.add('landed');
                    setTimeout(() => { p.classList.remove('landed'); p.classList.add('walking'); isJumping = false; }, 250);
                }
                p.style.bottom = (20 + (b/stage.offsetHeight)*100) + '%';
            }, 20);
        }

        function spawnObs() {
            if (!gameActive) return;
            let groupSize = Math.floor(Math.random() * 2) + 1; 
            for(let i = 0; i < groupSize; i++) {
                setTimeout(() => createObstacle(), i * 320);
            }
            let nextSpawn = Math.random() * 1200 + 900; 
            setTimeout(spawnObs, nextSpawn);
        }

        function createObstacle() {
            if(!gameActive) return;
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.innerHTML = `<img src="obj.png" width="75">`;
            stage.appendChild(obs);

            let pos = -100;
            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); obs.remove(); return; }
                pos += 12.5; obs.style.right = pos + 'px';

                const pRect = document.getElementById('player').getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();
                
                if (oRect.left < pRect.right - 25 && oRect.right > pRect.left + 25 && oRect.top < pRect.bottom - 15) {
                    if (!pfpImg.classList.contains('hit-effect')) {
                        pfpImg.classList.add('hit-effect');
                        hitLabel.innerText = hitPhrases[Math.floor(Math.random()*hitPhrases.length)];
                        hitLabel.style.opacity = "1";
                        setTimeout(() => { pfpImg.classList.remove('hit-effect'); hitLabel.style.opacity = "0"; }, 400);
                    }
                }

                if (pos > window.innerWidth + 120) {
                    clearInterval(move); obs.remove(); score++;
                    if (score >= 35) { gameActive = false; setTimeout(() => changeScreen('game-wrapper', 'final-screen'), 500); }
                }
            }, 20);
        }
    </script>
</body>
</html>
