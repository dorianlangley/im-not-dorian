<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
        }

        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1.2s ease-in-out; 
            z-index: 1; pointer-events: none;
        }

        #start-screen { display: flex; opacity: 1; z-index: 100; pointer-events: all; }
        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 3.5rem; color: #1a1a1a; margin-bottom: 40px; text-align: center; }
        .btn-start { padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer; background-color: #f5f5dc; color: black; border-radius: 50px; transition: 0.3s; position: relative; z-index: 110; pointer-events: all; }

        /* --- Chat UI --- */
        #chat-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        #chat-container { width: 100%; max-width: 500px; height: 75vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; scroll-behavior: smooth; margin: 0 auto; pointer-events: all; }
        #chat-container::-webkit-scrollbar { width: 0px; }
        .message { margin-bottom: 20px; display: flex; opacity: 0; animation: fadeInMsg 0.5s forwards; width: 100%; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 14px 20px; border-radius: 20px 20px 20px 0; max-width: 85%; }
        .bubble-right { background: #f5f5dc; color: black; padding: 14px 20px; border-radius: 20px 20px 0 20px; max-width: 85%; }
        #input-area { height: 100px; width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #eee; background: white; margin: 0 auto; pointer-events: all; }
        .option-chip { background: #f5f5dc; padding: 12px 24px; border-radius: 30px; cursor: pointer; border: 1px solid #ddd; margin: 5px; }

        /* --- Game UI --- */
        #game-wrapper { width: 100vw; height: 100vh; background: #fff; overflow: hidden; display: flex; flex-direction: column; }
        #game-stage { width: 100%; flex: 1; position: relative; overflow: hidden; display: flex; align-items: flex-end; pointer-events: all; }
        #ground { width: 100%; height: 20vh; background: #000; z-index: 20; position: relative; }
        #player { position: absolute; bottom: 0; left: 10%; width: 45px; height: 45px; z-index: 25; transform-origin: bottom center; }
        .obstacle { position: absolute; bottom: 0; right: -60px; width: 50px; height: 50px; z-index: 22; transform-origin: bottom center; animation: jellyWalk 0.6s infinite alternate ease-in-out; }
        @keyframes jellyWalk { 0% { transform: scale(1.2, 0.8); } 100% { transform: scale(0.8, 1.2); } }
        
        .cloud { position: absolute; opacity: 0.12; z-index: 1; pointer-events: none; }
        #game-text-overlay {
            position: absolute; top: 20%; width: 85%; left: 7.5%; text-align: center;
            font-size: 1.05rem; color: #1a1a1a; z-index: 50; line-height: 1.6;
            pointer-events: none; transition: opacity 1.5s, transform 1.5s; opacity: 0;
        }

        #white-out { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; display: none; opacity: 0; transition: opacity 3.5s ease-in; }

        /* Player Animations */
        .walking { animation: walkElastic 0.4s infinite alternate ease-in-out; }
        @keyframes walkElastic { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }
        .jumping { animation: jumpStretch 0.5s forwards; }
        @keyframes jumpStretch { 0% { transform: scale(1, 1); } 50% { transform: scale(0.8, 1.3); } 100% { transform: scale(1, 1); } }
        .landed { animation: landImpact 0.25s forwards; }
        @keyframes landImpact { 0% { transform: scale(1.7, 0.3); } 50% { transform: scale(1.2, 0.8); } 100% { transform: scale(1, 1); } }

        #countdown { font-size: 5rem; font-family: 'Arial Black', sans-serif; position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 30; color: #000; }
        #hit-text { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.6rem; opacity: 0; z-index: 40; }
        .hit-effect { filter: grayscale(1) contrast(200%); animation: vibrate 0.1s linear 2; }
        @keyframes vibrate { 0% { transform: translateX(3px); } 100% { transform: translateX(-3px); } }

        /* Final Screen UI */
        #final-screen { background: white; z-index: 210; padding: 20px 0; }
        .nana-text { font-family: 'Cormorant Upright', serif; font-size: 2.6rem; font-style: italic; margin: 10px 0; }
        .drawing-img { 
            max-width: 92%; 
            max-height: 60vh;
            height: auto; 
            border: 1px solid #eee; 
            margin: 15px 0; 
            opacity: 0; 
            filter: blur(10px);
            transition: opacity 3s ease, filter 3s ease; 
        }
        .final-btn { 
            background: #1a1a1a; color: white; border: none; padding: 16px 32px; 
            border-radius: 50px; cursor: pointer; text-decoration: none; 
            font-size: 0.9rem; margin-top: 15px; display: none; opacity: 0; transition: opacity 2s; 
        }

        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="white-out"></div>

    <div id="start-screen" class="screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="changeScreen('start-screen', 'chat-wrapper', startChat)">click me</button>
    </div>

    <div id="chat-wrapper" class="screen">
        <div id="chat-container">
            <div id="chat-content"></div>
            <div id="typing-indicator" style="display:none; font-style: italic; color: #aaa; margin-bottom: 20px;">Dorian is typing...</div>
        </div>
        <div id="input-area"></div>
    </div>

    <div id="game-wrapper" class="screen">
        <div id="game-text-overlay"></div>
        <div id="countdown"></div>
        <div id="game-stage" onmousedown="playerJump()" ontouchstart="playerJump()">
            <div id="player" class="walking">
                <div id="hit-text">OW!</div>
                <img src="pfp.png" width="100%" id="pfp-img" style="border-radius:8px;">
            </div>
        </div>
        <div id="ground"></div>
    </div>

    <div id="final-screen" class="screen">
        <div id="final-text-content" style="text-align: center; padding: 0 25px; max-width: 500px;"></div>
        <img src="claria_nana.jpeg" id="final-drawing" class="drawing-img">
        <div id="final-subtext" style="font-size: 0.92rem; color: #444; margin-bottom: 15px; opacity: 0; transition: 2.5s; padding: 0 30px; text-align: center; line-height: 1.4;"></div>
        <a href="https://drive.google.com/file/d/1YYImLyLB-FpGZiSXzdNXVak57-bs21rS/view?usp=sharing" target="_blank" id="drive-btn" class="final-btn">click here to download from drive.</a>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatContent = document.getElementById('chat-content');
        const inputArea = document.getElementById('input-area');
        const typing = document.getElementById('typing-indicator');
        const pfpImg = document.getElementById('pfp-img');
        const hitLabel = document.getElementById('hit-text');
        const gameOverlay = document.getElementById('game-text-overlay');
        const stage = document.getElementById('game-stage');
        let gameActive = false, isJumping = false;

        /* General screen transition logic */
        function changeScreen(from, to, callback) {
            const f = document.getElementById(from); const t = document.getElementById(to);
            f.style.opacity = '0'; f.style.pointerEvents = 'none';
            setTimeout(() => { f.style.display = 'none'; t.style.display = 'flex';
                setTimeout(() => { t.style.opacity = '1'; t.style.pointerEvents = 'all'; t.style.zIndex = '100'; if (callback) callback(); }, 100);
            }, 1200);
        }

        /* --- Chat Dialog Logic --- */
        function startChat() {
            typeLeft("Clara", () => {
                typeLeft("I know I said I wouldn’t talk to you anymore", () => {
                    typeLeft("I’m lowkey about to have nightmares imagining you seeing this...", () => {
                        typeLeft("but, can I talk to you?", () => {
                            showOptions([
                                { text: "ugh fine", action: startApology },
                                { text: "no! sorry", action: handleNo }
                            ]);
                        });
                    });
                });
            });
        }

        /* Logic for when the user refuses the chat */
        function handleNo() {
            addBubble("right", "no! sorry");
            setTimeout(() => {
                typing.style.display = 'block';
                setTimeout(() => {
                    typing.style.display = 'none';
                    addBubble("left", "...");
                    setTimeout(() => {
                        addBubble("left", "please? it will be quick");
                        showOptions([{ text: "ugh fine", action: startApology }]);
                    }, 1000);
                }, 1500);
            }, 500);
        }

        /* Main apology flow before starting the game */
        function startApology() {
            addBubble("right", "ugh fine");
            typeLeft("thank you…", () => {
                typeLeft("I wanted to apologize", () => {
                    setTimeout(() => {
                        addBubble("right", "again?");
                        setTimeout(() => {
                            typeLeft("stop, you know me :(", () => {
                                typeLeft("I miss having you as a friend", () => {
                                    typeLeft("and talking to you every day", () => {
                                        typeLeft("I wanted to update you on everything", () => {
                                            typeLeft("and know how you’ve been too", () => {
                                                typeLeft("if you got into college, your days, my days...", () => {
                                                    typeLeft("can I entertain you for a bit?", () => {
                                                        showOptions([{ text: "I guess lol", action: () => changeScreen('chat-wrapper', 'game-wrapper', startCountdown) }]);
                                                    });
                                                });
                                            });
                                        });
                                    });
                                });
                            });
                        }, 1000);
                    }, 1200);
                });
            });
        }

        /* Helper function to simulate 'is typing' effect */
        function typeLeft(text, callback) {
            typing.style.display = 'block';
            chatContainer.scrollTo(0, chatContainer.scrollHeight);
            setTimeout(() => {
                typing.style.display = 'none';
                addBubble("left", text);
                if(callback) callback();
            }, 1500);
        }

        function addBubble(side, text) {
            const div = document.createElement('div'); div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            chatContent.appendChild(div); chatContainer.scrollTo(0, chatContainer.scrollHeight);
        }

        function showOptions(opts) {
            inputArea.innerHTML = '';
            opts.forEach(o => {
                const btn = document.createElement('div'); btn.className = 'option-chip'; btn.innerText = o.text;
                btn.onclick = () => { inputArea.innerHTML = ''; o.action(); };
                inputArea.appendChild(btn);
            });
        }

        /* --- Game Core Logic --- */
        const gameFrases = [
            "Clara, yeah, I put this here just so you’d keep taking damage lol but don’t worry, the game keeps going and you can’t die, you’re just gonna stay there complaining in the corner.",
            "I’m kinda losing it rn. I wasn’t being dramatic when I said I was doing really bad, I messed up with you and if you really are dating someone, you and your boyfriend will probably think this is awful...",
            "but this isn’t a confession or some emotional plea, I just miss my funny friend.",
            "I know I broke your trust and I shouldn’t have gotten involved in anyone’s problems (yeah I got kinda dragged later for always giving my opinion about it but I didn’t mean anything bad, I was just talking to both sides).",
            "I’m still kinda messed up but I’m in therapy now and I realized I needed to give you a proper apology.",
            "I miss talking to you and having friends in general, it’s not just because I’m alone, but you get it… I kinda pushed myself away and honestly I think I only really care about you and like two other people.",
            "I watched Donnie Darko, it’s actually really good. #literallyme, I tried watching One Piece but… not really my thing.",
            "And the Portuguese “lessons”? yeah it’s kinda hard ngl so I dropped it for now but I know the super basics.",
            "I’m not here to beg you for anything, I just feel okay talking to you, even if it’s like this…",
            "I kinda dream about a perfect future where I get to be your friend again.",
            "Dorian Langley."
        ];

        function startCountdown() {
            let count = 3; const cd = document.getElementById('countdown');
            const timer = setInterval(() => {
                cd.innerText = count <= 0 ? "GO!" : count;
                if (count < -1) { clearInterval(timer); cd.innerText = ""; startGame(); }
                count--;
            }, 800);
        }

        function startGame() { 
            gameActive = true; 
            spawnWave(); 
            setInterval(spawnCloud, 3000);
            setTimeout(() => showGameText(0), 2000); 
        }

        /* Ambient clouds spawning logic */
        function spawnCloud() {
            if(!gameActive) return;
            const cloud = document.createElement('img'); cloud.src = 'obj-cloud.png'; cloud.className = 'cloud';
            cloud.style.width = (Math.random() * 50 + 70) + 'px'; cloud.style.top = (Math.random() * 120 + 20) + 'px';
            cloud.style.right = '-150px'; stage.appendChild(cloud);
            let pos = -150; let speed = Math.random() * 0.7 + 1;
            const moveCloud = setInterval(() => {
                if(!gameActive) { clearInterval(moveCloud); cloud.remove(); return; }
                pos += speed; cloud.style.right = pos + 'px';
                if (pos > window.innerWidth + 150) { clearInterval(moveCloud); cloud.remove(); }
            }, 20);
        }

        /* Scripted text sequence during gameplay */
        function showGameText(idx) {
            if (idx >= gameFrases.length) { setTimeout(endGameSequence, 2000); return; }
            gameOverlay.innerText = gameFrases[idx];
            gameOverlay.style.opacity = 1;
            gameOverlay.style.transform = "translateY(0)";
            setTimeout(() => {
                gameOverlay.style.opacity = 0;
                gameOverlay.style.transform = "translateY(-10px)";
                setTimeout(() => showGameText(idx + 1), 1500);
            }, 6800);
        }

        /* Transition to white screen and final surprise */
        function endGameSequence() {
            const wo = document.getElementById('white-out');
            wo.style.display = 'block';
            setTimeout(() => { 
                wo.style.opacity = 1; 
                setTimeout(showFinalScreen, 4000);
            }, 100);
        }

        /* Final screen delicate animation logic */
        function showFinalScreen() {
            const final = document.getElementById('final-screen');
            const textContent = document.getElementById('final-text-content');
            final.style.display = 'flex'; 
            final.style.opacity = 1;

            setTimeout(() => {
                textContent.innerHTML = `<p style="opacity:0; transition:3s ease; font-size:1.1rem; filter:blur(5px);" id="f1">you thought it was just this kinda low-effort site? nuh uh. I don’t show up empty-handed</p>`;
                setTimeout(() => { 
                    const e = document.getElementById('f1');
                    e.style.opacity = 1; e.style.filter = "blur(0)";
                }, 500);
                
                setTimeout(() => {
                    textContent.innerHTML += `<p class="nana-text" style="opacity:0; transition:3s ease; filter:blur(5px);" id="f2">for you, Nana fan.</p>`;
                    setTimeout(() => {
                        const e = document.getElementById('f2');
                        e.style.opacity = 1; e.style.filter = "blur(0)";
                    }, 500);
                    
                    setTimeout(() => {
                        const draw = document.getElementById('final-drawing');
                        draw.style.opacity = 1;
                        draw.style.filter = "blur(0)";
                        setTimeout(() => {
                            const sub = document.getElementById('final-subtext');
                            sub.innerText = "I think I should’ve made your hair longer… and idk if you’d even wear this outfit";
                            sub.style.opacity = 1;
                            const btn = document.getElementById('drive-btn');
                            btn.style.display = 'inline-block';
                            setTimeout(() => btn.style.opacity = 1, 800);
                        }, 3500);
                    }, 3500);
                }, 5000);
            }, 1500);
        }

        /* Jump physics logic */
        function playerJump() {
            if (isJumping || !gameActive) return;
            isJumping = true; const p = document.getElementById('player');
            p.classList.remove('walking', 'landed'); p.classList.add('jumping');
            let b = 0, v = 15.5, g = 0.78;
            const jumpInterval = setInterval(() => {
                v -= g; b += v;
                if (b <= 0) {
                    b = 0; clearInterval(jumpInterval); p.style.bottom = '0px';
                    p.classList.remove('jumping'); p.classList.add('landed');
                    setTimeout(() => { p.classList.remove('landed'); p.classList.add('walking'); isJumping = false; }, 250);
                }
                p.style.bottom = b + 'px';
            }, 20);
        }

        /* Spawning obstacles in waves for dynamic gameplay */
        function spawnWave() {
            if (!gameActive) return;
            const count = Math.floor(Math.random() * 2) + 1; // 1 or 2 obstacles per wave
            for(let i = 0; i < count; i++) {
                setTimeout(createObstacle, i * 550); // Gap between obstacles in the same wave
            }
            setTimeout(spawnWave, Math.random() * 2000 + 1500); // Delay between different waves
        }

        /* Single obstacle logic and collision detection */
        function createObstacle() {
            if (!gameActive) return;
            const obs = document.createElement('div'); obs.className = 'obstacle';
            const size = window.innerWidth < 600 ? 50 : 80;
            obs.innerHTML = `<img src="obj.png" width="${size}">`; stage.appendChild(obs);
            let pos = -size;
            const speed = (window.innerWidth < 600 ? 7.5 : 11.5);
            const move = setInterval(() => {
                if (!gameActive) { clearInterval(move); obs.remove(); return; }
                pos += speed; obs.style.right = pos + 'px';
                const pRect = pfpImg.getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();
                
                /* Simple bounding box collision check */
                if (oRect.left < pRect.right - 15 && oRect.right > pRect.left + 15 && oRect.top < pRect.bottom - 5) {
                    if (!pfpImg.classList.contains('hit-effect')) {
                        pfpImg.classList.add('hit-effect'); hitLabel.style.opacity = "1";
                        setTimeout(() => { pfpImg.classList.remove('hit-effect'); hitLabel.style.opacity = "0"; }, 400);
                    }
                }
                if (pos > window.innerWidth + 100) { clearInterval(move); obs.remove(); }
            }, 20);
        }
    </script>
</body>
</html>
