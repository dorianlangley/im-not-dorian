<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@300;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: white; font-family: 'Raleway', sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            height: 100vh; flex-direction: column;
        }

        /* --- Tela 1: Capa --- */
        #start-screen { text-align: center; z-index: 10; transition: opacity 0.8s; display: flex; flex-direction: column; align-items: center; }
        .hello-text { font-family: 'Cormorant Upright', serif; font-size: 5rem; margin-bottom: 40px; color: #1a1a1a; }
        .btn-start {
            padding: 18px 50px; font-size: 1.1rem; border: 1px solid #1a1a1a; cursor: pointer;
            background-color: #f5f5dc; color: black; letter-spacing: 2px;
            transition: all 0.3s; border-radius: 50px;
        }
        .btn-start:active { background-color: black; color: #f5f5dc; }

        /* --- Tela 2: Chat --- */
        #chat-container {
            display: none; width: 90%; max-width: 500px; height: 80vh;
            flex-direction: column; opacity: 0; transition: opacity 1s;
            overflow-y: auto; padding: 20px;
        }
        #chat-container::-webkit-scrollbar { display: none; }

        .message { margin-bottom: 15px; display: flex; opacity: 0; animation: fadeInMsg 0.4s forwards; }
        .msg-left { justify-content: flex-start; }
        .msg-right { justify-content: flex-end; }
        
        .bubble-left { background: #1a1a1a; color: #f5f5dc; padding: 12px 18px; border-radius: 18px 18px 18px 0; max-width: 80%; font-weight: 300; }
        .bubble-right { background: #f5f5dc; color: black; padding: 12px 18px; border-radius: 18px 18px 0 18px; max-width: 80%; font-weight: 400; }

        .option-btn { 
            display: block; margin: 10px 0; text-decoration: underline; cursor: pointer; font-weight: 500;
        }

        .typing { font-style: italic; color: #aaa; font-size: 0.8rem; margin-bottom: 10px; display: none; }
        
        /* Brilhos Pretos */
        .sparkle {
            position: absolute; width: 3px; height: 3px; background: black; border-radius: 50%; pointer-events: none;
            animation: floatUp 5s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(20vh); opacity: 0; }
        }

        @keyframes fadeInMsg { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shake 0.5s infinite; color: red !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .hidden { display: none !important; }

        #final-screen { display: none; text-align: center; opacity: 0; transition: opacity 2s; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="hello-text">hello</div>
        <button class="btn-start" onclick="start()">click me</button>
    </div>

    <div id="chat-container">
        <div id="chat-content"></div>
        <div id="typing-indicator" class="typing">Dorian is typing...</div>
    </div>

    <div id="final-screen">
        <h2 style="font-family: 'Cormorant Upright'; font-size: 3rem;">For you.</h2>
        <img src="desenho.jpg" style="max-width: 80%; border: 1px solid #eee; padding: 10px;">
    </div>

    <script>
        const content = document.getElementById('chat-content');
        const typing = document.getElementById('typing-indicator');

        function start() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('chat-container').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('chat-container').style.opacity = '1';
                    setInterval(createSparkle, 800);
                    nextMsg(0);
                }, 100);
            }, 800);
        }

        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }

        const script = [
            { side: 'left', text: 'Clara' },
            { side: 'left', text: 'I know I said I wouldn’t talk to you anymore' },
            { side: 'left', text: 'I’m lowkey about to have nightmares just imagining the sigh you’re gonna let out seeing I sent you this link…' },
            { side: 'left', text: 'but, can I talk to you?' },
            { side: 'choose', options: [
                { text: 'ugh fine', next: 7 },
                { text: 'no! sorry', next: 'no' }
            ]},
            { side: 'left', text: '...' }, 
            { side: 'force', text: 'ugh fine', next: 7 },
            { side: 'left', text: 'thank you…' },
            { side: 'left', text: 'I wanted to apologize' },
            { side: 'right_auto', text: 'again?', next: 10 },
            { side: 'left', text: 'stop, you know me :(' },
            { side: 'left', text: 'I miss having you as a friend' },
            { side: 'left', text: 'and talking to you every day' },
            { side: 'left', text: 'I wanted to update you on everything' },
            { side: 'left', text: 'and know how you’ve been too' },
            { side: 'left', text: 'if you got into college' },
            { side: 'left', text: 'your days' },
            { side: 'left', text: 'my days…' },
            { side: 'left', text: 'can I entertain you for a bit?' },
            { side: 'right_auto', text: 'I guess lol', next: 'final' }
        ];

        function nextMsg(idx) {
            if (idx === 'final') { finish(); return; }
            if (idx === 'no') { 
                nextMsg(5); 
                setTimeout(() => nextMsg(6), 3000); 
                return; 
            }

            const m = script[idx];
            if (m.side === 'left') {
                typing.style.display = 'block';
                // Digitação rápida: 20ms por caractere
                setTimeout(() => {
                    typing.style.display = 'none';
                    addBubble('left', m.text);
                    setTimeout(() => nextMsg(idx + 1), 800);
                }, m.text.length * 20);
            } else if (m.side === 'choose') {
                addOptions(m.options);
            } else if (m.side === 'force') {
                addOptions([{ text: m.text, next: m.next, shake: true }]);
            } else if (m.side === 'right_auto') {
                setTimeout(() => {
                    addBubble('right', m.text);
                    setTimeout(() => nextMsg(m.next), 1500);
                }, 2000);
            }
        }

        function addBubble(side, text) {
            const div = document.createElement('div');
            div.className = `message msg-${side}`;
            div.innerHTML = `<div class="bubble-${side}">${text}</div>`;
            content.appendChild(div);
            document.getElementById('chat-container').scrollTop = content.scrollHeight;
        }

        function addOptions(opts) {
            const div = document.createElement('div');
            div.className = 'message msg-right';
            const b = document.createElement('div');
            b.className = 'bubble-right';
            opts.forEach(o => {
                const s = document.createElement('div');
                s.className = 'option-btn' + (o.shake ? ' shake' : '');
                s.innerText = o.text;
                s.onclick = () => { div.remove(); nextMsg(o.next); };
                b.appendChild(s);
            });
            div.appendChild(b);
            content.appendChild(div);
            document.getElementById('chat-container').scrollTop = content.scrollHeight;
        }

        function finish() {
            document.getElementById('chat-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('chat-container').classList.add('hidden');
                document.getElementById('final-screen').style.display = 'block';
                setTimeout(() => document.getElementById('final-screen').style.opacity = '1', 100);
            }, 1000);
        }
    </script>
</body>
</html>
